@if (authService.status() === 'initializing') {
  <p>Authentication is loading…</p>
}

@if (authService.status() === 'anonymous') {
  <button type="button" (click)="signIn()">
    Sign in with Discord
  </button>
}

@if (authService.status() === 'authenticated') {
  <p>
    Signed in as
    {{ authService.user()?.user_metadata?.['full_name'] }}
  </p>

  <a routerLink="/games/new">
    Create game
  </a>

  <a routerLink="/games/join">
    Join game
  </a>
}
