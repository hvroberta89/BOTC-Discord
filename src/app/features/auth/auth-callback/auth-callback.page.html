@if (hasFailed()) {
  <section class="callback-state">
    <h1>Sign in failed</h1>

    <p>
      The authentication session could not be completed.
    </p>

    <a href="/">
      Return to the home page
    </a>
  </section>
} @else {
  <section class="callback-state">
    <h1>Completing sign in…</h1>

    <p>
      Please wait while your Discord account is connected.
    </p>
  </section>
}
